site_name: RoleplayCore Database Report
site_url: https://voxcore84.github.io/roleplaycore-report/
site_description: Data Quality & Optimization Summary — WoW 12.x / Midnight

repo_url: https://github.com/VoxCore84/roleplaycore-report
repo_name: VoxCore84/roleplaycore-report

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Data Import & Hotfix Repair: data-import.md
  - NPC Audits & Corrections: npc-audits.md
  - Quests & Localization: quest-localization.md
  - Database Cleanup: database-cleanup.md
  - Performance & Build Diff: performance.md
  - Placement Audits: placement.md
  - Tooling & Results: results.md
  - Hotfix Redundancy Audit: hotfix-audit.md
  - Discoveries & Lessons: discoveries.md
  - Timeline & Reference: reference.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.mark
  - pymdownx.critic
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VoxCore84

copyright: RoleplayCore &mdash; VoxCore84 &mdash; March 2026
